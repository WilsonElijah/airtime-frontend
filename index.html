<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTU Airtime Dispenser</title>
    <style>
        /* Clean, Professional Corporate UI */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .vtu-container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        input,
        select {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #3498db;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2980b9;
        }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        #status-message {
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .success {
            color: #27ae60;
        }

        .error {
            color: #e74c3c;
        }
    </style>
</head>

<body>

    <div class="vtu-container">
        <h2>Airtime Dispenser</h2>
        <form id="vtu-form">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 08012345678" required>
            </div>

            <div class="form-group">
                <label>Network Provider</label>
                <select id="network" required>
                    <option value="" disabled selected>Select Network</option>
                    <option value="MTN">MTN</option>
                    <option value="Airtel">Airtel</option>
                    <option value="Glo">Glo</option>
                    <option value="9Mobile">9Mobile</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount (₦)</label>
                <input type="number" id="amount" placeholder="100" min="50" required>
            </div>

            <button type="submit" id="submit-btn">Send Airtime</button>
            <div id="status-message"></div>
        </form>
    </div>

    <script>
        document.getElementById('vtu-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('status-message');

            const phone = document.getElementById('phone').value;
            const network = document.getElementById('network').value;
            const amount = document.getElementById('amount').value;

            // UI Loading State
            btn.textContent = 'Processing Transaction...';
            btn.disabled = true;
            statusMsg.textContent = '';
            statusMsg.className = '';

            try {
                // REPLACE THIS URL WITH YOUR LIVE RENDER URL
                const response = await fetch('https://airtime-backend-zuob.onrender.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone, network, amount })
                });

                const data = await response.json();

                if (data.success) {
                    statusMsg.textContent = `✅ ${data.message} (Ref: ${data.transactionId})`;
                    statusMsg.className = 'success';
                    document.getElementById('vtu-form').reset();
                } else {
                    statusMsg.textContent = `❌ Error: ${data.message}`;
                    statusMsg.className = 'error';
                }
            } catch (error) {
                statusMsg.textContent = '❌ Connection failed. Is the server running?';
                statusMsg.className = 'error';
            } finally {
                // Reset UI
                btn.textContent = 'Send Airtime';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
