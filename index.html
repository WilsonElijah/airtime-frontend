<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtime Dispenser</title>
    <!-- Prevent favicon.ico 404 console errors -->
    <link rel="icon" href="data:,">
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --input-bg: #1f2937;
            --border-color: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h3 {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
            margin-top: 24px;
        }

        h3:first-child {
            margin-top: 0;
        }

        /* Recipients Input */
        .recipients-wrapper {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            min-height: 54px;
            transition: all 0.3s ease;
        }

        .recipients-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .recipient-pill {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: popIn 0.2s ease-out;
        }

        .recipient-pill button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .recipient-pill button:hover {
            color: var(--error);
        }

        .recipients-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            flex: 1;
            min-width: 120px;
            padding: 6px 0;
        }

        .recipients-input::placeholder {
            color: var(--text-secondary);
        }

        /* Providers Grid */
        .providers-grid {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .provider-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .provider-item:hover {
            transform: translateY(-2px) scale(1.05);
        }

        .provider-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            transform: scale(1.05);
        }

        .provider-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CSS fallback logos if images fail */
        .provider-fallback {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .fallback-mtn { background: #ffcc00; color: #000; }
        .fallback-glo { background: #009900; color: #fff; font-style: italic; text-transform: lowercase; font-size: 1.2rem;}
        .fallback-9mobile { background: #006600; color: #fff; }
        .fallback-airtel { background: #ff0000; color: #fff; text-transform: lowercase; }

        /* Top Deals */
        .deals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .deal-card {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .deal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
        }

        .deal-card.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .deal-card.active::before {
            background: var(--accent);
        }

        .deal-card span {
            display: block;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .deal-card h4 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Amount Input */
        .amount-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .amount-wrapper span {
            position: absolute;
            left: 16px;
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .amount-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 16px 16px 36px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s;
        }

        .amount-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Continue Button */
        .continue-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .continue-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
        }

        .continue-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .continue-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        /* Status Area */
        .status-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-item {
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: popIn 0.3s ease-out;
        }

        .status-item.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-item.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .status-item.pending {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--accent);
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>

<body>

    <div class="app-container">
        <h2 style="text-align: center; margin-bottom: 24px; font-weight: 700; font-size: 1.8rem; color: var(--text-primary); letter-spacing: -0.5px;">Airtime Dispenser</h2>
        <h3>Recipients</h3>
        <div class="recipients-wrapper" id="recipients-wrapper">
            <!-- Pills will go here -->
            <input type="tel" class="recipients-input" id="recipients-input" placeholder="Enter number">
        </div>

        <h3>Select provider</h3>
        <div class="providers-grid" id="providers-grid">
            <div class="provider-item" data-network="MTN" onclick="selectProvider(this, 'MTN')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/New-mtn-logo.jpg/512px-New-mtn-logo.jpg" alt="MTN" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="provider-fallback fallback-mtn" style="display:none; width:100%; height:100%; align-items:center; justify-content:center;">MTN</div>
            </div>
            <div class="provider-item" data-network="Glo" onclick="selectProvider(this, 'Glo')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Glo_button.png" alt="Glo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="provider-fallback fallback-glo" style="display:none; width:100%; height:100%; align-items:center; justify-content:center;">glo</div>
            </div>
            <div class="provider-item" data-network="9Mobile" onclick="selectProvider(this, '9Mobile')">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/f6/9mobile_Logo.svg/512px-9mobile_Logo.svg.png" alt="9Mobile" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="provider-fallback fallback-9mobile" style="display:none; width:100%; height:100%; align-items:center; justify-content:center;">9mobile</div>
            </div>
            <div class="provider-item" data-network="Airtel" onclick="selectProvider(this, 'Airtel')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Airtel_logo.svg/512px-Airtel_logo.svg.png" alt="Airtel" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="provider-fallback fallback-airtel" style="display:none; width:100%; height:100%; align-items:center; justify-content:center;">airtel</div>
            </div>
        </div>

        <h3>Top deals</h3>
        <div class="deals-grid" id="deals-grid">
            <div class="deal-card" onclick="selectDeal(this, 100)">
                <span>Quick Topup</span>
                <h4>₦100</h4>
            </div>
            <div class="deal-card" onclick="selectDeal(this, 200)">
                <span>Quick Topup</span>
                <h4>₦200</h4>
            </div>
            <div class="deal-card" onclick="selectDeal(this, 500)">
                <span>Quick Topup</span>
                <h4>₦500</h4>
            </div>
            <div class="deal-card" onclick="selectDeal(this, 1000)">
                <span>Quick Topup</span>
                <h4>₦1000</h4>
            </div>
            <div class="deal-card" onclick="selectDeal(this, 2000)">
                <span>Quick Topup</span>
                <h4>₦2000</h4>
            </div>
            <div class="deal-card" onclick="selectDeal(this, 5000)">
                <span>Quick Topup</span>
                <h4>₦5000</h4>
            </div>
        </div>

        <h3>Enter amount</h3>
        <div class="amount-wrapper">
            <span>₦</span>
            <input type="number" class="amount-input" id="custom-amount" placeholder="e.g. 1000" min="100" oninput="clearDealSelection()">
        </div>

        <button class="continue-btn" id="continue-btn" onclick="processTransactions()">
            <span class="spinner" id="btn-spinner"></span>
            <span id="btn-text">Continue</span>
        </button>

        <div class="status-area" id="status-area"></div>
    </div>

    <script>
        // -------------------------------------------------------------
        // IMPORTANT: Replace this with your actual Render Backend URL
        // Example: 'https://airtime-backend-xyz.onrender.com'
        // -------------------------------------------------------------
        const RENDER_BACKEND_URL = 'https://YOUR-RENDER-APP-URL.onrender.com';

        let recipients = [];
        let selectedNetwork = '';
        const inputEl = document.getElementById('recipients-input');
        const wrapperEl = document.getElementById('recipients-wrapper');
        const amountEl = document.getElementById('custom-amount');
        const statusArea = document.getElementById('status-area');

        // --- Recipient Pill Logic ---
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ' || e.key === ',') {
                e.preventDefault();
                addRecipient(this.value);
            }
        });

        // Add recipient on blur as well
        inputEl.addEventListener('blur', function() {
            if (this.value.trim() !== '') {
                addRecipient(this.value);
            }
        });

        function addRecipient(value) {
            const num = value.replace(/[^0-9+]/g, '');
            if (num.length >= 10 && !recipients.includes(num)) {
                recipients = [num]; // Restrict to only 1 recipient
                renderPills();
            }
            inputEl.value = '';
        }

        function removeRecipient(index) {
            recipients.splice(index, 1);
            renderPills();
        }

        function renderPills() {
            // Remove existing pills
            const existing = wrapperEl.querySelectorAll('.recipient-pill');
            existing.forEach(el => el.remove());

            // Add new pills before the input
            recipients.forEach((num, idx) => {
                const pill = document.createElement('div');
                pill.className = 'recipient-pill';
                pill.innerHTML = `
                    ${num}
                    <button type="button" onclick="removeRecipient(${idx})">&times;</button>
                `;
                wrapperEl.insertBefore(pill, inputEl);
            });

            if (recipients.length >= 1) {
                inputEl.style.display = 'none';
            } else {
                inputEl.style.display = 'block';
                inputEl.focus();
            }
        }

        // --- Provider Selection ---
        function selectProvider(el, network) {
            const items = document.querySelectorAll('.provider-item');
            items.forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            selectedNetwork = network;
        }

        // --- Deals Selection ---
        function selectDeal(el, amount) {
            const cards = document.querySelectorAll('.deal-card');
            cards.forEach(card => card.classList.remove('active'));
            el.classList.add('active');
            amountEl.value = amount;
        }

        function clearDealSelection() {
            const cards = document.querySelectorAll('.deal-card');
            cards.forEach(card => card.classList.remove('active'));
        }

        // --- Transaction Processing ---
        async function processTransactions() {
            const amount = amountEl.value;

            // Validation
            if (recipients.length === 0) {
                alert("Please add at least one recipient.");
                return;
            }
            if (!selectedNetwork) {
                alert("Please select a network provider.");
                return;
            }
            if (!amount || amount < 100) {
                alert("Please enter a valid amount (minimum ₦100).");
                return;
            }

            // UI State Update
            const btn = document.getElementById('continue-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            
            btn.disabled = true;
            btnText.textContent = 'Processing...';
            spinner.style.display = 'block';
            statusArea.innerHTML = ''; // Clear previous status

            const isLocal = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' || 
                            window.location.protocol === 'file:';
            
            const apiEndpoint = isLocal 
                ? 'http://localhost:5000/api/dispense-airtime' 
                : `${RENDER_BACKEND_URL}/api/dispense-airtime`;

            // Process each recipient sequentially
            for (let i = 0; i < recipients.length; i++) {
                const phone = recipients[i];
                const statusId = `status-${i}`;
                
                // Add pending status box
                statusArea.insertAdjacentHTML('beforeend', `
                    <div class="status-item pending" id="${statusId}">
                        <i class="fas fa-spinner fa-spin"></i> Sending ₦${amount} to ${phone}...
                    </div>
                `);

                try {
                    const response = await fetch(apiEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            phoneNumber: phone,
                            network: selectedNetwork,
                            amount: amount
                        })
                    });

                    const data = await response.json();
                    const statusEl = document.getElementById(statusId);

                    if (data.success || response.ok) {
                        statusEl.className = 'status-item success';
                        statusEl.innerHTML = `✓ Success: ₦${amount} sent to ${phone}`;
                    } else {
                        statusEl.className = 'status-item error';
                        statusEl.innerHTML = `✗ Failed: ${data.message || 'Transaction failed'} for ${phone}`;
                    }
                } catch (error) {
                    const statusEl = document.getElementById(statusId);
                    statusEl.className = 'status-item error';
                    statusEl.innerHTML = `✗ Error: Cannot connect to backend (Network Failure). Make sure backend is running.`;
                    console.error("Fetch Error:", error);
                }
            }

            // Restore UI
            btn.disabled = false;
            btnText.textContent = 'Continue';
            spinner.style.display = 'none';
        }
    </script>
</body>

</html>
