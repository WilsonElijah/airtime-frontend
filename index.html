<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise VTU Dispenser Portal</title>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: rgba(17, 25, 40, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-glow: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --accent-hover: linear-gradient(135deg, #2563eb 0%, #7c3ded 100%);
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .portal-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
        }

        /* Subtle top glow bar */
        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 3px;
            background: var(--accent-glow);
            border-radius: 0 0 100px 100px;
            filter: blur(1px);
        }

        .logo-tag {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input,
        select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus,
        select:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        button {
            background: var(--accent-glow);
            color: #ffffff;
            border: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Beautiful Status Box */
        #status-box {
            margin-top: 1.5rem;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.9rem;
            display: none;
            text-align: left;
            line-height: 1.5;
            border: 1px solid transparent;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-box {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2) !important;
            color: #34d399;
            display: block !important;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2) !important;
            color: #f87171;
            display: block !important;
        }
    </style>
</head>

<body>

    <div class="portal-card">
        <span class="logo-tag">Internal System</span>
        <h2>VTU Dispenser Portal</h2>

        <form id="vtu-form">
            <div class="form-group">
                <label for="phone">Recipient Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 08012345678" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="network">Network Provider</label>
                <select id="network" required>
                    <option value="" disabled selected>Select Carrier</option>
                    <option value="MTN">MTN NG</option>
                    <option value="Airtel">Airtel NG</option>
                    <option value="Glo">Glo NG</option>
                    <option value="9Mobile">9Mobile NG</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Top-up Value (₦)</label>
                <input type="number" id="amount" placeholder="Minimum 50" min="50" required autocomplete="off">
            </div>

            <button type="submit" id="submit-btn">
                <span class="spinner" id="btn-spinner"></span>
                <span id="btn-text">Execute Disbursement</span>
            </button>

            <div id="status-box"></div>
        </form>
    </div>

    <script>
        document.getElementById('vtu-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            const statusBox = document.getElementById('status-box');

            const phone = document.getElementById('phone').value;
            const network = document.getElementById('network').value;
            const amount = document.getElementById('amount').value;

            // Update UI to Loading State
            btnText.textContent = 'Processing Transaction...';
            spinner.style.display = 'block';
            btn.disabled = true;
            statusBox.className = '';
            statusBox.style.display = 'none';

            try {
                const response = await fetch('https://airtime-backend-zuob.onrender.com/api/dispense-airtime', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone, network, amount })
                });

                const data = await response.json();

                if (data.success) {
                    statusBox.innerHTML = `<strong>Transaction Successful</strong><br>${data.message}<br><span style="font-size: 0.8rem; opacity: 0.8;">ID: ${data.transactionId}</span>`;
                    statusBox.className = 'success-box';
                    document.getElementById('vtu-form').reset();
                } else {
                    statusBox.innerHTML = `<strong>Disbursement Failed</strong><br>${data.message}`;
                    statusBox.className = 'error-box';
                }
            } catch (error) {
                statusBox.innerHTML = `<strong>Network Timeout</strong><br>The gateway server is unreachable. Verify connection.`;
                statusBox.className = 'error-box';
            } finally {
                // Reset Button State
                btnText.textContent = 'Execute Disbursement';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
